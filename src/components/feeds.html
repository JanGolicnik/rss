<script &&>
    return p.feeds
        .map(
            (feed) => `
  <li class="feed-item">
    <div class="feed-main">
      <div>
        <h3 class="feed-title">${escape(feed.title) ?? "untitled"}</h3>
        <p class="small">added by <a href="/profile/?id=${feed.added_by}">${escape(feed.added_by_username) ?? "unknown"}</a></p>
      </div>
      <p class="feed-url">${escape(feed.url)}</p>
    </div>
    <span class="feed-count">${feed.entry_count} links</span>
    ${
        p.session.is_admin
            ? `
            <form action="delete/?feed_id=${feed.id}" method="post" onsubmit="return confirm('Remove this feed and all its entries?');">
              <button type="submit" class="btn btn-danger">remove</button>
            </form>`
            : ""
    }
  </li>
  `,
        )
        .join("");
</script>

{{{ c.entry_article(p.entry) }}}

<script &&>
  let out = "";
  for (const comment of p.comments)
  {
    out += `<p>${comment.created_at} <a href="/profile/?id=${comment.author_id}">&lt${escape(comment.username)}&gt</a>: ${escape(comment.content)}</p>`;
  }
  return out;
</script>

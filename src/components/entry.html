<article
    class="entry needs-favicon"
    data-feed="{{ p.feed_title || p.feed_url }}"
    data-domain="{{ p.url.split('/')[2] }}"
>
    <div class="entry-main">
        <img
            class="favicon"
            src="/favicon/?domain={{ p.url.split('/')[2] }}"
            alt="favicon"
            loading="lazy"
        />
        <a
            class="entry-title"
            href="{{ p.url }}"
            data-go="/go/?entry_id={{ p.id }}"
            target="_blank"
            rel="noopener"
        >
            {{ p.is_bookmark ? "Site showcase: " : "" }} {{ (p.title &&
            p.title.trim()) ? p.title : p.url.split('/')[2] }}
        </a>
        <script &&>
            let out = "";
            if (p.tags && !p.is_bookmark) {
                const tag_list = p.tags.split(", ");
                out += '<div class="entry-tags">';
                tag_list
                    .slice(0, 4)
                    .forEach(
                        (tag) => (out += `<span class="tag">${tag}</span>`),
                    );
                if (tag_list.length > 4)
                    out += `<span class="tag tag-more">+${tag_list.length - 4}</span>`;
                out += "</div>";
            }
            return out;
        </script>
        <script &&>
            return p.date
                ? `<span class="date">${p.date.slice(0, 10)}</span>`
                : "";
        </script>
    </div>
    <div class="entry-info">
        <span class="feed-tag">
            {{ p.is_bookmark ? "site" : (p.feed_title || p.feed_url ||
            '').slice(0, 20) }}
        </span>
        <script &&>
            return p.visits && p.visits > 0
                ? `<span class="visits" title="${p.visits} visit${p.visits !== 1 ? "s" : ""}">${p.visits} <span class="eye">👁</span></span>`
                : "";
        </script>
        <script &&>
            return p.author ? `<span class="author">by ${p.author}</span>` : "";
        </script>
        <script &&>
            return p.hn_url
                ? `<a href="${p.hn_url}" target="_blank" rel="noopener noreferrer" title="On Hacker News"><img class="favicon" src="https://news.ycombinator.com/favicon.ico" alt="Hacker News"></a>`
                : "";
        </script>
        <script &&>
            return p.lobste_url
                ? `<a href="${p.lobste_url}" target="_blank" rel="noopener noreferrer" title="On Lobsters"><img class="favicon" src="https://lobste.rs/favicon.ico" alt="Lobsters"></a>`
                : "";
        </script>
    </div>
</article>

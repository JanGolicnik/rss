<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>{{{ p.title ?? "blogsoni" }}}</title>
        <link rel="stylesheet" href="/public/style.css" />
        <link rel="icon" type="image/svg+xml" href="/public/favicon.svg" />
    </head>

    <body>
        <div id="left-right">
            <div>
                <header>{{{ p.header ?? "" }}}</header>

                <aside class="msg">{{{ p.msg ?? "" }}}</aside>

                <aside class="options">{{{ p.aside ?? "" }}}</aside>

                <main {{p.wide_main ? `class="wide"` : ""}}>{{{ p.body ?? "" }}}</main>
            </div>

            <iframe id="site-preview" src="about:blank" title="page"></iframe>
        </div>

        <footer>
            <a href="https://github.com/JanGolicnik/rss">source</a>
        </footer>
    </body>

    {{{ p.script ? `<script src=\"${p.script}\"></script>` : "" }}}
</html>

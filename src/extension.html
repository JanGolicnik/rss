<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>{{{ p.title ?? "blogsoni" }}}</title>
        <link rel="stylesheet" href="/public/style.css" />
        <link rel="icon" type="image/svg+xml" href="/public/favicon.svg" />
    </head>

    <body id="extension">
        <h1>
            Submit a feed to
            <a href="https://blogsoni.duckdns.org/">Blogsoni!</a>
        </h1>
        <aside class="msg">{{{ p.msg ?? "" }}}</aside>
        {{{ c.submit_aside(p) }}}
    </body>
</html>
